<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | CareerNav</title>
    <style>
        :root {
            --bg-primary: #F8FAFC;
            --bg-secondary: #FFFFFF;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --accent-blue: #3B82F6;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0F172A;
                --bg-secondary: #1E293B;
                --text-primary: #F1F5F9;
                --text-secondary: #94A3B8;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 { margin-bottom: 8px; }
        p { color: var(--text-secondary); line-height: 1.5; margin-bottom: 24px; }
        button {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        svg { margin-bottom: 24px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="card">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 2l20 20M17.5 17.5A10 10 0 0 0 6.5 6.5M21.5 21.5a14 14 0 0 0-19-19"></path>
        </svg>
        <h1>You're Offline</h1>
        <p>Don't worry, your data is saved locally. Reconnect to sync and explore more.</p>
        <button onclick="location.reload()">Retry Connection</button>
    </div>
</body>
</html>
