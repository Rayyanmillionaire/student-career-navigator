<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Premium career management platform for students">
    <meta name="theme-color" content="#3B82F6">
    <title>CareerNav — Student Career Navigator</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    
    <!-- Favicon (Inline SVG for speed/reliability) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%233B82F6%22/><path d=%22M50 20 L80 50 L50 80 L20 50 Z%22 fill=%22%23FFFFFF%22/></svg>">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <!-- CSS Design System -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div id="app" class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar__logo">
                <i data-lucide="compass" style="width: 28px; height: 28px;"></i>
                <span class="sidebar__logo-text">CareerNav</span>
            </div>
            
            <nav class="sidebar__nav">
                <div class="sidebar__section-title">Main</div>
                <a class="sidebar__item" href="#/dashboard" data-route="/dashboard">
                    <i data-lucide="home" class="sidebar__icon"></i>
                    <span class="sidebar__label">Dashboard</span>
                </a>
                <a class="sidebar__item" href="#/profile" data-route="/profile">
                    <i data-lucide="user" class="sidebar__icon"></i>
                    <span class="sidebar__label">Profile</span>
                </a>
                <a class="sidebar__item" href="#/roadmaps" data-route="/roadmaps">
                    <i data-lucide="map" class="sidebar__icon"></i>
                    <span class="sidebar__label">Roadmaps</span>
                </a>
                <a class="sidebar__item" href="#/skills" data-route="/skills">
                    <i data-lucide="zap" class="sidebar__icon"></i>
                    <span class="sidebar__label">Skills</span>
                </a>
                
                <div class="sidebar__section-title">Career</div>
                <a class="sidebar__item" href="#/resume" data-route="/resume">
                    <i data-lucide="file-text" class="sidebar__icon"></i>
                    <span class="sidebar__label">Resume</span>
                </a>
                <a class="sidebar__item" href="#/internships" data-route="/internships">
                    <i data-lucide="briefcase" class="sidebar__icon"></i>
                    <span class="sidebar__label">Internships</span>
                </a>
                <a class="sidebar__item" href="#/certifications" data-route="/certifications">
                    <i data-lucide="award" class="sidebar__icon"></i>
                    <span class="sidebar__label">Certifications</span>
                </a>
                
                <div class="sidebar__section-title">Productivity</div>
                <a class="sidebar__item" href="#/goals" data-route="/goals">
                    <i data-lucide="target" class="sidebar__icon"></i>
                    <span class="sidebar__label">Goals</span>
                </a>
                <a class="sidebar__item" href="#/productivity" data-route="/productivity">
                    <i data-lucide="clock" class="sidebar__icon"></i>
                    <span class="sidebar__label">Productivity</span>
                </a>
                <a class="sidebar__item" href="#/analytics" data-route="/analytics">
                    <i data-lucide="bar-chart-2" class="sidebar__icon"></i>
                    <span class="sidebar__label">Analytics</span>
                </a>
                
                <div class="sidebar__section-title">System</div>
                <a class="sidebar__item" href="#/notifications" data-route="/notifications">
                    <i data-lucide="bell" class="sidebar__icon"></i>
                    <span class="sidebar__label">Notifications</span>
                </a>
                <a class="sidebar__item" href="#/admin" data-route="/admin" data-admin-only style="display: none;">
                    <i data-lucide="shield" class="sidebar__icon"></i>
                    <span class="sidebar__label">Admin</span>
                </a>
                <a class="sidebar__item" href="#/settings" data-route="/settings">
                    <i data-lucide="settings" class="sidebar__icon"></i>
                    <span class="sidebar__label">Settings</span>
                </a>
            </nav>
            
            <button class="sidebar__toggle" id="sidebarToggle" aria-label="Toggle Sidebar">
                <i data-lucide="chevron-left"></i>
            </button>
        </aside>

        <!-- Topbar -->
        <header class="topbar" id="topbar">
            <div class="topbar__left">
                <button class="topbar__icon-btn hamburger-btn" id="hamburgerBtn" aria-label="Menu">
                    <i data-lucide="menu"></i>
                </button>
            </div>
            
            <div class="topbar__center">
                <div class="topbar__search">
                    <i data-lucide="search"></i>
                    <input type="text" id="topbarSearch" placeholder="Search skills, roadmaps, certificates...">
                    <span class="topbar__search-hint">Ctrl K</span>
                </div>
            </div>
            
            <div class="topbar__right">
                <button class="topbar__icon-btn" id="themeToggleBtn" aria-label="Toggle Theme">
                    <i data-lucide="sun"></i>
                </button>
                <button class="topbar__icon-btn" id="notifBtn" aria-label="Notifications" style="position: relative;">
                    <i data-lucide="bell"></i>
                    <span id="notifBadge" style="display: none; position: absolute; top: 4px; right: 4px; width: 16px; height: 16px; background: var(--danger); color: white; border-radius: 50%; font-size: 10px; font-weight: bold; align-items: center; justify-content: center; border: 2px solid var(--bg-glass);">0</span>
                </button>
                
                <div class="dropdown">
                    <button class="topbar__icon-btn dropdown__trigger" id="userAvatarBtn" style="padding: 0;">
                        <div class="avatar avatar--sm">
                            <span class="avatar__initials">U</span>
                            <img class="avatar__img" src="" alt="" style="display: none;">
                        </div>
                    </button>
                    <div class="dropdown__menu" id="userDropdown">
                        <button class="dropdown__item" id="ddProfile"><i data-lucide="user"></i> Profile</button>
                        <button class="dropdown__item" id="ddSettings"><i data-lucide="settings"></i> Settings</button>
                        <div class="dropdown__divider"></div>
                        <button class="dropdown__item text-danger" id="ddLogout"><i data-lucide="log-out"></i> Logout</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="main-content" id="mainContent">
            <!-- Router injects page content here -->
        </main>

        <!-- Mobile Bottom Nav -->
        <nav class="mobile-nav" id="mobileNav">
            <a href="#/dashboard" class="mobile-nav__item"><i data-lucide="home"></i><span>Home</span></a>
            <a href="#/search" class="mobile-nav__item"><i data-lucide="search"></i><span>Search</span></a>
            <a href="#/notifications" class="mobile-nav__item"><i data-lucide="bell"></i><span>Notifs</span></a>
            <a href="#/profile" class="mobile-nav__item"><i data-lucide="user"></i><span>Profile</span></a>
            <a href="#/settings" class="mobile-nav__item"><i data-lucide="settings"></i><span>Settings</span></a>
        </nav>
    </div>

    <!-- CDNs -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- Application Entry Point -->
    <script type="module" src="js/app.js"></script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('SW registered:', reg))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
